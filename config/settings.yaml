version: "1.0"

# ── Watch Folders ─────────────────────────────────────────────────────────────
watch_folders:
  - path: "./watch_inbox"
    recursive: false
    auto_create: true

# ── OCR Settings ──────────────────────────────────────────────────────────────
ocr:
  # 'cloud', 'local', or 'auto' (prefer local, fallback to cloud)
  mode: auto

  # Which Cloud API to use
  api_key: "${ZHIPU_API_KEY}" # Loaded from .env
  cloud_endpoint: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
  cloud_model: "glm-ocr"
  
  # Advanced GLM parameters
  thinking_enabled: false     # Applies to GLM-4.5V, GLM-4.6V (GLM-OCR does not use this)
  temperature: 0.1
  max_tokens: 4096
  local_endpoint: "http://localhost:8000/v1/chat/completions"
  local_model_path: ""    # Path to local model weights directory
  max_image_side_px: 4096
  jpeg_quality: 85
  timeout_seconds: 60
  max_retries: 4
  retry_base_delay: 1.0
  retry_backoff_factor: 2.0

# ── Classification Rules ──────────────────────────────────────────────────────
classification:
  rules_file: "./config/default_rules.yaml"
  enabled: true

# ── Threading ─────────────────────────────────────────────────────────────────
threading:
  max_worker_threads: 4   # Set to 0 to auto-detect (min(4, cpu_count))

# ── UI ────────────────────────────────────────────────────────────────────────
ui:
  theme: "auto"           # "dark" | "light" | "auto" (reads Windows system preference)
  thumbnail_size: 120
  thumbnail_cache_max: 200
  window_title: "DMS — Document Management System"
  window_width: 1280
  window_height: 800

# ── Output ────────────────────────────────────────────────────────────────────
output:
  searchable_pdf_suffix: "_searchable"
  default_output_dir: "./processed"
  ocr_output_dir: "./processed"  # OCR text files will be saved to OCR_Result subfolder under this directory
